<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1q
    +CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Login</title>
</head>
<body>
    <main id="container">
        <form id="login_form">

            <div id="form_header">
                <h1>Login</h1>
                <i id="mode_icon" class="fa-solid fa-moon"></i>
            </div>

            <div id="inputs">
                <div id="input-box">
                    <label for="RM">RM:
                        <div class="input-field">
                            <i mode_icon class="fa-solid fa-user"></i>
                            <input type="password" name="RM" id="RM" required>
                        </div>
                    </label>
                </div>

                <div id="inputs">
                    <div id="input-box">
                        <label for="senha">Senha:
                            <div class="input-field">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" name="senha" id="senha" required>
                            </div>
                        </label>
                    </div>
            </div>
            <button type="submit" id="login_button">Login</button>
        </form>
</main>
    <script type="text/javascript" src="login.js"></script>
</body>
</html>
